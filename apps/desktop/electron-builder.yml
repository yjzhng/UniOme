appId: com.yjzhng.uniome
productName: UniOme
copyright: © yjzhng

# Pinned because electron is hoisted to the repo-root node_modules (npm workspaces), so
# electron-builder can't infer the version from apps/desktop/node_modules.
electronVersion: 33.4.11

directories:
  output: dist
  buildResources: build-resources

# What goes inside the app (asar). The single-file server bundle + the Electron shell; node_modules
# is intentionally absent (the server is fully bundled, the shell uses only Electron built-ins).
files:
  - electron/**
  - build/server.cjs
  - build/organism-catalog.json
  - build/organisms/**
  - build/icon.png
  - package.json

# The web dist is shipped UNPACKED (a real directory) so the embedded server's @fastify/static can
# serve it; it lands at <App>/Contents/Resources/web (process.resourcesPath/web).
extraResources:
  - from: build/web
    to: web

asar: true

mac:
  category: public.app-category.education
  icon: build-resources/icon.icns
  # Arch is chosen on the CLI (see the dist / dist:arm64 / dist:x64 scripts) so each variant builds
  # exactly one architecture; a target-level arch list here would override those flags.
  target:
    - target: dmg
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Reproducibly UNSIGNED: don't auto-sign with whatever cert happens to be on the build machine (an
  # Apple *Development* cert is worse than unsigned for other users). Unsigned builds run via right-click
  # → Open. To sign for real: remove `identity: null`, set CSC_LINK/CSC_KEY_PASSWORD to a Developer ID,
  # and add a notarize step.
  identity: null

dmg:
  title: ${productName} ${version}
